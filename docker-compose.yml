#version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: api-container
    ports:
      - "8000:8000"  # Exposing API service
    environment:
      - PYTHONPATH=/home/appuser/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - .:/home/appuser/app  # Mount current directory into the container
    working_dir: /home/appuser/app
    depends_on:
      codegen:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped
    user: "${UID}:${GID}"  # Use host's current UID and GID
    #command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --log-level error
    command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120 api.main:app

  codegen:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    container_name: codegen-container
    working_dir: /home/appuser/app
    volumes:
      - .:/home/appuser/app
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: >
      sh -c "
      echo 'Generating SQLAlchemy models...' &&
      sqlacodegen postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB} > /home/appuser/app/api/models.py &&
      echo 'Models generated'
      "

  client:
    image: nginx:alpine  # Temporary stub
    container_name: client-container
    ports:
      - "8080:80"  # Exposing Admin Panel
    restart: unless-stopped
    volumes:
      - ./client:/usr/share/nginx/html:ro

  prisma-migrate:
    build:
      context: ./prisma
      dockerfile: Dockerfile.prisma
    container_name: prisma-migrate-container
    working_dir: /app
    volumes:
      - ./prisma:/app
      - prisma-node-modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      - db
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      pg_isready -h db -U ${POSTGRES_USER} &&
      npx prisma migrate deploy &&
      echo 'Migrations completed' || echo 'No migrations yet'
      "

  db:
    image: postgres:latest
    container_name: db-container
    ports:
      - "5432:5432"  # Exposing PostgreSQL database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - usage-stats-pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d/  # Mount init script
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6379:6379"  # Exposing Redis cache
    volumes:
      - usage-stats-redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

  celery:
    build:
      context: ./api
      dockerfile: Dockerfile.celery
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: celery-container
    volumes:
      - .:/home/appuser/app  # Mount current directory into the container
    working_dir: /home/appuser/app
    depends_on:
      - api
      - redis
    environment:
      PYTHONPATH: /home/appuser/app
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    restart: unless-stopped
    user: "${UID}:${GID}"  # Use host's current UID and GID
    command: celery -A api.celery_app worker --loglevel=error --pool=gevent

  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile.celery
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: celery-beat-container
    volumes:
      - usage-stats-celery-beat-schedule:/celerybeat-schedule
      - .:/home/appuser/app  # Mount current directory into the container
    working_dir: /home/appuser/app
    depends_on:
      - api
      - redis
    environment:
      PYTHONPATH: /home/appuser/app
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    restart: unless-stopped
    user: "${UID}:${GID}"  # Use host's current UID and GID
    command: celery -A api.celery_app beat --loglevel=error --schedule=/celerybeat-schedule/celerybeat-schedule

volumes:
  usage-stats-celery-beat-schedule:
    driver: local
  usage-stats-redisdata:
    driver: local
  usage-stats-pgdata:
    driver: local
  prisma-node-modules:
    driver: local

networks:
  default:
    name: usage-stats-api-network
